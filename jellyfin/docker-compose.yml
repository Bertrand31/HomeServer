services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    user: 1000:988
    group_add:
      - '992' # Result of: getent group render | cut -d: -f3
    ports:
      - 8096:8096/tcp
      - 7359:7359/udp
    volumes:
      - /home/bertrand/jellyfin/config:/config
      - /home/bertrand/jellyfin/cache:/cache
      - type: bind
        source: /home/bertrand/downloads
        target: /media
    restart: 'unless-stopped'
    # Optional - may be necessary for docker healthcheck to pass if running in host network mode
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
