services:
  beszel:
    image: henrygd/beszel:latest
    container_name: beszel
    restart: unless-stopped
    environment:
      APP_URL: http://localhost:8090
    ports:
      - 8090:8090
    volumes:
      - /srv/appdata/beszel/beszel_data:/beszel_data
      - /srv/appdata/beszel/beszel_socket:/beszel_socket

  beszel-agent:
    image: henrygd/beszel-agent-intel
    container_name: beszel-agent
    cap_add:
      - CAP_PERFMON # For Intel GPU
      - SYS_RAWIO # required for S.M.A.R.T. data
      - SYS_ADMIN # required for NVMe S.M.A.R.T. data
    devices:
      - /dev/dri/card0:/dev/dri/card0 # Intel GPU
      - /dev/dri/renderD128:/dev/dri/renderD128
      - /dev/sda:/dev/sda
      - /dev/nvme0:/dev/nvme0
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /srv/appdata/beszel/beszel_agent_data:/var/lib/beszel-agent
      # monitor other disks / partitions by mounting a folder in /extra-filesystems
      - /home:/extra-filesystems/sda1__Media:ro
    environment:
      LISTEN: 45876
      KEY: ${KEY}
      TOKEN: ${TOKEN}
      HUB_URL: http://localhost:8090
    env_file:
      - .env
    restart: unless-stopped
