<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>Casper</title>

		<link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="shortcut icon" href="/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
		<meta name="apple-mobile-web-app-title" content="MyWebSite" />
		<link rel="manifest" href="/site.webmanifest" />

		<meta name="viewport" content="width=device-width, initial-scale=1.0">

		<style>

body{
	margin:0;
	font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
	background:url("./background.avif") no-repeat center center/cover;
	height:100vh;
	display:flex;
	justify-content:center;
	align-items:center;
	color:white;
}

/* glass panel */

.dashboard{
	backdrop-filter: blur(25px);
	background: rgba(0,0,0,0.35);
	padding:40px;
	border-radius:35px;
	box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

/* grid */

.grid{
	display:grid;
	grid-template-columns:repeat(3,130px);
	gap:35px;
}

/* tile */

.tile{
	text-decoration:none;
	color:white;
	text-align:center;
}

.icon{
	width:100px;
	height:100px;
	border-radius:26px;
	padding:10px;
	overflow:hidden;
	margin:auto;
	box-shadow:
		0 10px 20px rgba(0,0,0,0.4),
	inset 0 1px 0 rgba(255,255,255,0.3);
transition:all .25s ease;
}

.icon img{
	width:100%;
	height:100%;
}

.tile:hover .icon{
	transform:scale(1.12);
}

.label{
	margin-top:8px;
	font-size:15px;
}

/* clock */

.clock{
	text-align:center;
	font-size:48px;
	margin-bottom:25px;
	font-weight:600;
}

.date{
	font-size:18px;
	opacity:0.8;
}

@media(max-width:700px){

	.grid{
		grid-template-columns:repeat(2,120px);
		gap:25px;
	}

	.icon{
		width:90px;
		height:90px;
	}

}

		</style>
	</head>

	<body>

		<div class="dashboard">

			<div class="clock">
				<div id="time"></div>
				<div class="date" id="date"></div>
			</div>

			<div class="grid">

				<a class="tile" href="http://192.168.0.45/jellyfin/" target="_blank">
					<div class="icon">
						<img src="https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/jellyfin.png">
					</div>
					<div class="label">Jellyfin</div>
				</a>

				<a class="tile" href="http://192.168.0.45:2283" target="_blank">
					<div class="icon">
						<img src="https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/immich.png">
					</div>
					<div class="label">Immich</div>
				</a>

				<a class="tile" href="http://192.168.0.45/transmission-vpn/transmission/web/" target="_blank">
					<div class="icon">
						<img src="https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/transmission.png">
					</div>
					<div class="label">Transmission</div>
				</a>

				<a class="tile" href="https://192.168.0.45:943" target="_blank">
					<div class="icon">
						<img src="https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/openvpn.png">
					</div>
					<div class="label">OpenVPN</div>
				</a>

				<a class="tile" href="http://192.168.0.45/adguard/" target="_blank">
					<div class="icon">
						<img src="https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/adguard-home.png">
					</div>
					<div class="label">AdGuard</div>
				</a>

				<a class="tile" href="http://192.168.0.45:8090" target="_blank">
					<div class="icon">
						<img src="https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/beszel-light.svg">
					</div>
					<div class="label">Beszel</div>
				</a>

			</div>
		</div>
		<script>

			function updateClock(){

				const now = new Date()

				const time = now.toLocaleTimeString([],{
					hour:'2-digit',
					minute:'2-digit'
				})

				const date = now.toLocaleDateString(undefined,{
					weekday:'long',
					month:'long',
					day:'numeric'
				})

				document.getElementById("time").textContent=time
				document.getElementById("date").textContent=date

			}

			setInterval(updateClock,5000)
			updateClock()

		</script>

	</body>
</html>
