services:
  beszel:
    image: henrygd/beszel:latest
    container_name: beszel
    restart: unless-stopped
    environment:
      APP_URL: http://localhost:8090
    ports:
      - 8090:8090
    volumes:
      - /home/bertrand/beszel/beszel_data:/beszel_data
      - /home/bertrand/beszel/beszel_socket:/beszel_socket

  beszel-agent:
    image: henrygd/beszel-agent
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /home/bertrand/beszel/beszel_agent_data:/var/lib/beszel-agent
      # monitor other disks / partitions by mounting a folder in /extra-filesystems
      - /home:/extra-filesystems/sda1__Media:ro
    environment:
      LISTEN: 45876
      KEY: 'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDXFIRTsEE4pIfoPdt67HO+2qVhXvoiDtFi3Vc2j/GTF'
      TOKEN: ab89-023cc9df08-fcc7-f53c566318
      HUB_URL: http://localhost:8090
