services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    user: 1000:988
    group_add:
      - '992' # Result of: getent group render | cut -d: -f3
    volumes:
      - /srv/appdata/jellyfin/config:/config
      - /srv/appdata/jellyfin/cache:/cache
      - type: bind
        source: /home/bertrand/data/media
        target: /media
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
    restart: 'unless-stopped'
    network_mode: "service:gluetun"
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    user: 1000:1000
    environment:
      - TZ=Europe/Paris
    volumes:
      - /srv/appdata/prowlarr:/config
    restart: unless-stopped
    network_mode: "service:gluetun"
  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    container_name: seerr
    environment:
      - LOG_LEVEL=debug
      - TZ=Europe/Paris
      - PORT=5055 #optional
    volumes:
      - /srv/appdata/seer/config:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    restart: unless-stopped
    network_mode: "service:gluetun"
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    user: 1000:1000
    environment:
      - TZ=Europe/Paris
    volumes:
      - /srv/appdata/radarr/config:/config
      - /home/bertrand/data:/data
    restart: unless-stopped
    network_mode: "service:gluetun"
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    user: 1000:1000
    environment:
      - TZ=Europe/Paris
    volumes:
      - /srv/appdata/sonarr/config:/config
      - /home/bertrand/data:/data
    restart: unless-stopped
    network_mode: "service:gluetun"
  sportarr:
    image: sportarr/sportarr:latest
    container_name: sportarr
    user: 1000:1000
    environment:
      - UMASK=022
      - TZ=Europe/Paris
    volumes:
      - /srv/appdata/sportarr:/config
      - /home/bertrand/data:/data
    restart: unless-stopped
    network_mode: "service:gluetun"
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    user: 1000:1000
    environment:
      - TZ=Europe/Paris
      - WEBUI_PORT=9092
      - TORRENTING_PORT=42991
    volumes:
      - /srv/appdata/qbittorrent:/config
      - /home/bertrand/data:/data
    restart: unless-stopped
    network_mode: "service:gluetun"
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - LOG_FILE=none
      - LOG_HTML=false
      # - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
      - TZ=Europe/Paris
    volumes:
      - /srv/appdata/flaresolverr:/config
    restart: unless-stopped
    network_mode: "service:gluetun"
  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      # - 8888:8888/tcp # HTTP proxy
      # - 8388:8388/tcp # Shadowsocks
      # - 8388:8388/udp # Shadowsocks
      - 9696:9696 # Prowlarr
      - 5055:5055 # Seer
      - 7878:7878 # Radarr
      - 8989:8989 # Sonarr
      - 1867:1867 # Sportarr
      # - 7474:7474 # Autobrr
      - 9092:9092 # qBittorrent
      - 8096:8096/tcp # Jellyfin
      - 7359:7359/udp # Jellyfin
      # - 8191:8191 # Flaresolverr
    environment:
      - VPN_SERVICE_PROVIDER=airvpn
      - VPN_TYPE=openvpn
      - SERVER_COUNTRIES=Netherlands
      - FIREWALL_VPN_INPUT_PORTS=42991
      - TZ=Europe/Paris
      - UPDATER_PERIOD=24h
      - DNS_UPSTREAM_RESOLVERS=quad9 secured,libredns
      - BLOCK_SURVEILLANCE=on
      - BLOCK_ADS=on
    volumes:
      - /srv/appdata/gluetun:/gluetun
